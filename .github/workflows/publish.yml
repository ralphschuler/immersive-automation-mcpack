name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  MINECRAFT_VERSION: 1.20.1

  MODRINTH_ID: RTIfQdFP
  CURSEFORGE_ID: 1206555

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Setup pakku
        run: brew install juraj-hrivnak/pakku/pakku

      - name: Build and Export
        run: pakku export

      - name: Get Tag or Commit
        id: tag_or_commit
        run: echo ::set-output name=tag_or_branch::$(echo ${{ github.event.release.tag_name }} || echo ${{ github.sha }})

      - name: Move Exported Files
        run: |
          mkdir -p build/output

          mv build/curseforge/*.zip build/output/immersive-automation-modpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.zip
          mv build/modrinth/*.mrpack build/output/immersive-automation-modpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.mrpack
          mv build/serverpack/*.zip build/output/immersive-automation-serverpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.zip

      - name: Publish
        uses: Kira-NT/mc-publish@v3.3
        with:
          name: Immersive Automation ${{ steps.tag_or_commit.outputs.tag_or_branch }} for Minecraft ${{ env.MINECRAFT_VERSION }}
          version: mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}
          loaders: forge
          game-versions: ${{ env.MINECRAFT_VERSION }}

          modrinth-id: ${{ env.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-files: |
            build/output/immersive-automation-modpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.mrpack
            build/output/immersive-automation-serverpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.zip

          curseforge-id: ${{ env.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-files: |
            build/output/immersive-automation-modpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.zip
            build/output/immersive-automation-serverpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.zip

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-files: |
            build/output/immersive-automation-modpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.zip
            build/output/immersive-automation-serverpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.zip
            build/output/immersive-automation-modpack-mc${{ env.MINECRAFT_VERSION }}-${{ steps.tag_or_commit.outputs.tag_or_branch }}.mrpack
